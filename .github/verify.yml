name: Verify
on:
  workflow_call:
  workflow_dispatch:

jobs:

    check:
        name: Check
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup
        - name: Audit dependencies
          run: pnpm audit
          continue-on-error: true

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup
          with:
            build-packages: true
    tests:
        name: Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup
          with:
            build-packages: true

        - name: Run cairo-abi-codec tests
          uses: nick-fields/retry@v3
          with:
            timeout_minutes: 20
            max_attempts: 3
            command: pnpm test
